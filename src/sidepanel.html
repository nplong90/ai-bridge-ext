<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <style>
    :root {
      --bg: #ffffff;
      --fg: #0d0d0d;
      --muted: #8e8ea0;
      --border: #e3e3e6;
      --field-bg: #f7f7f8;
      --accent: #10a37f;
      --accent-hover: #0e8e6f;
      --accent-fg: #ffffff;
      --card-bg: #f7f7f8;
      --ok: #10a37f;
      --err: #e02e2a;
      --info: #2b6cb0;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e20;
        --fg: #ececf1;
        --muted: #9a9aa8;
        --border: #37373b;
        --field-bg: #2a2a2d;
        --accent: #10a37f;
        --accent-hover: #16b892;
        --accent-fg: #ffffff;
        --card-bg: #29292c;
        --ok: #19c37d;
        --err: #ff6b68;
        --info: #6ab0ff;
      }
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      width: 100%;
      background: var(--bg);
      color: var(--fg);
      font: 14px/1.5 -apple-system, "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { min-height: 100vh; padding: 14px; display: flex; flex-direction: column; gap: 12px; }

    /* Header */
    header { display: flex; align-items: center; gap: 9px; }
    .logo {
      width: 26px; height: 26px; border-radius: 7px; flex: none;
      background: var(--accent); color: var(--accent-fg);
      display: grid; place-items: center; font-size: 15px; font-weight: 700;
    }
    .titles { display: flex; flex-direction: column; line-height: 1.2; flex: 1; min-width: 0; }
    .title { font-weight: 600; font-size: 14px; }
    .subtitle { color: var(--muted); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .new-btn {
      border: 1px solid var(--border); background: var(--bg); color: var(--fg);
      border-radius: 8px; cursor: pointer; font: 500 12px/1 inherit; padding: 7px 10px;
      flex: none; transition: background .15s;
    }
    .new-btn:hover { background: var(--field-bg); }

    .provider-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
    .provider-row select {
      flex: 1; padding: 7px 9px; border-radius: 9px; border: 1px solid var(--border);
      background: var(--field-bg); color: var(--fg); font: inherit;
    }

    /* Composer */
    .composer {
      position: relative;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--field-bg);
      transition: border-color .15s, box-shadow .15s;
      flex: none;
    }
    .composer:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent);
    }
    textarea {
      width: 100%; border: 0; outline: 0; resize: none; background: transparent;
      color: var(--fg); font: inherit; padding: 11px 12px 6px; min-height: 76px; max-height: 240px;
    }
    textarea::placeholder { color: var(--muted); }
    textarea:disabled { opacity: .6; }

    .composer-foot { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px 8px 12px; }
    .hint { color: var(--muted); font-size: 11px; }
    kbd {
      font: 500 10px/1 ui-monospace, monospace; color: var(--muted);
      border: 1px solid var(--border); border-radius: 4px; padding: 2px 5px; background: var(--bg);
    }

    /* Send button */
    .send {
      display: inline-flex; align-items: center; gap: 6px;
      border: 0; border-radius: 9px; cursor: pointer;
      background: var(--accent); color: var(--accent-fg);
      font: 600 13px/1 inherit; padding: 8px 14px;
      transition: background .15s, opacity .15s;
    }
    .send:hover:not(:disabled) { background: var(--accent-hover); }
    .send:disabled { opacity: .55; cursor: default; }
    .spinner {
      width: 13px; height: 13px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,.4); border-top-color: #fff;
      animation: spin .7s linear infinite; display: none;
    }
    .is-loading .spinner { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Status */
    .status { display: none; align-items: center; gap: 7px; font-size: 12px; flex: none; }
    .status.show { display: flex; }
    .status .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
    .status[data-kind="info"] { color: var(--info); }
    .status[data-kind="info"] .dot { background: var(--info); animation: pulse 1.1s ease-in-out infinite; }
    .status[data-kind="ok"] { color: var(--ok); }
    .status[data-kind="ok"] .dot { background: var(--ok); }
    .status[data-kind="err"] { color: var(--err); }
    .status[data-kind="err"] .dot { background: var(--err); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

    /* Answer card — grows to fill the panel height */
    .answer { display: none; flex: 1; min-height: 0; flex-direction: column; border: 1px solid var(--border); border-radius: 12px; background: var(--card-bg); overflow: hidden; }
    .answer.show { display: flex; }
    .answer-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 8px 8px 12px; border-bottom: 1px solid var(--border); flex: none;
    }
    .answer-head span { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: .04em; text-transform: uppercase; }
    .copy {
      border: 1px solid var(--border); background: var(--bg); color: var(--fg);
      border-radius: 7px; cursor: pointer; font: 500 11px/1 inherit; padding: 5px 9px; transition: background .15s;
    }
    .copy:hover { background: var(--field-bg); }
    .answer-body { padding: 11px 12px; white-space: pre-wrap; word-break: break-word; overflow: auto; font-size: 13px; }
    .images { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 12px 12px; overflow: auto; }
    .images:empty { display: none; }
    .images img { max-width: 100%; border-radius: 8px; border: 1px solid var(--border); }
    .images a { font-size: 11px; color: var(--muted); }
    .answer-actions { display: flex; gap: 6px; align-items: center; }
    .voice-select {
      border: 1px solid var(--border); background: var(--bg); color: var(--fg);
      border-radius: 7px; font: 500 11px/1 inherit; padding: 5px 4px; max-width: 116px;
    }
    .voice-select[hidden] { display: none; }
    .copy:disabled { opacity: .55; cursor: default; }
    .audio { width: calc(100% - 24px); margin: 0 12px 10px; flex: none; }
    .audio[hidden] { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo">✦</div>
      <div class="titles">
        <div class="title">ChatGPT Wrapper</div>
        <div class="subtitle">Gửi prompt qua phiên đăng nhập sẵn</div>
      </div>
      <button id="new" class="new-btn" type="button">＋ Mới</button>
    </header>

    <label class="provider-row">
      <span>Nhà cung cấp</span>
      <select id="provider"></select>
    </label>

    <div class="composer">
      <textarea id="prompt" rows="3" placeholder="Nhập prompt của bạn…" autofocus></textarea>
      <div class="composer-foot">
        <span class="hint"><kbd id="kbd-hint">Ctrl</kbd> + <kbd>Enter</kbd> để gửi</span>
        <button id="send" class="send" type="button">
          <span class="spinner"></span>
          <span class="send-label">Gửi</span>
        </button>
      </div>
    </div>

    <div id="status" class="status"><span class="dot"></span><span id="status-text"></span></div>

    <div id="answer" class="answer">
      <div class="answer-head">
        <span>Trả lời</span>
        <div class="answer-actions">
          <select id="voice" class="voice-select" title="Giọng đọc (ngôn ngữ/khẩu âm)" hidden></select>
          <button id="tts" class="copy" type="button" hidden>🔊 Đọc</button>
          <button id="copy" class="copy" type="button">Sao chép</button>
        </div>
      </div>
      <div id="answer-body" class="answer-body"></div>
      <audio id="audio" class="audio" controls hidden></audio>
      <div id="images" class="images"></div>
    </div>
  </div>

  <script type="module" src="sidepanel.js"></script>
</body>
</html>
